name: Supabase 保活（防止免费项目休眠）

on:
  schedule:
    # 每周一、周四 UTC 00:27（北京 08:27）
    - cron: '27 0 * * 1,4'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZHJkcGlkeXh4YndwaHN0ZHB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NDY2MTQsImV4cCI6MjA5NjIyMjYxNH0.Z5AfS0ZOIJ4b_WNG81YYvl5jegP2Y4kEuOo2XUqn8Wc"
          curl -sf "https://pqdrdpidyxxbwphstdpz.supabase.co/rest/v1/workspaces?select=id&limit=1" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY" \
            && echo "Supabase OK" || echo "Ping failed (project might be paused)"
