    <style>
      #pre-splash {
        position: fixed; inset: 0; z-index: 999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #ececf0; padding: 40px 24px;
        font-family: "PingFang SC","Hiragino Sans GB","Helvetica Neue",-apple-system,sans-serif;
      }
      #pre-splash .ps-dancer { animation: psBounce 0.7s ease-in-out infinite; margin-bottom: 32px; }
      #pre-splash .ps-dancer img { display: block; image-rendering: pixelated; }
      #pre-splash .ps-title {
        font-family: "Noto Serif SC","PingFang SC",serif; font-size: 32px; font-weight: 600;
        color: #3d3e4c; margin: 0; letter-spacing: 0.08em; text-align: center;
        animation: psFadeUp 0.8s ease-out both;
      }
      #pre-splash .ps-divider {
        width: 40px; height: 3px; border-radius: 2px;
        background: linear-gradient(90deg,transparent,#7b6cf6,transparent);
        margin: 24px 0; animation: psExpand 1s 0.3s ease-out both;
      }
      #pre-splash .ps-slogan {
        font-family: "Noto Serif SC","PingFang SC",serif; font-size: 16px; color: #838496;
        margin: 0; letter-spacing: 0.06em; text-align: center; line-height: 1.8;
        animation: psFadeUp 0.8s 0.5s ease-out both;
      }
      #pre-splash .ps-dots { margin-top: 48px; display: flex; gap: 8px; animation: psFadeUp 0.6s 1s ease-out both; }
      #pre-splash .ps-dot {
        width: 6px; height: 6px; border-radius: 50%; background: #7b6cf6; opacity: 0.4;
      }
      #pre-splash .ps-dot:nth-child(1) { animation: psDot 1.4s 0s ease-in-out infinite; }
      #pre-splash .ps-dot:nth-child(2) { animation: psDot 1.4s 0.2s ease-in-out infinite; }
      #pre-splash .ps-dot:nth-child(3) { animation: psDot 1.4s 0.4s ease-in-out infinite; }
      @keyframes psFadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
      @keyframes psExpand { from { opacity:0; transform:scaleX(0); } to { opacity:1; transform:scaleX(1); } }
      @keyframes psDot { 0%,100% { opacity:0.3; transform:scale(1); } 50% { opacity:0.8; transform:scale(1.5); } }
      @keyframes psBounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
